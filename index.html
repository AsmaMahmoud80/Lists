<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قوائمي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222637;
    --border: #2e3347;
    --accent: #6c8ef5;
    --green: #3dd68c;
    --red: #f56c6c;
    --orange: #f5a623;
    --text: #e8eaf6;
    --text2: #8892b0;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; direction: rtl;
  }
  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #12152a 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
  }
  .header h1 { font-size: 1.35rem; font-weight: 900; }
  .header h1 span { color: var(--accent); }
  .header-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); padding: 7px 14px; border-radius: 10px;
    cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 0.78rem; font-weight: 700;
    transition: all 0.2s; display: flex; align-items: center; gap: 5px;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

  .board {
    display: flex; gap: 16px; padding: 16px;
    overflow-x: auto; align-items: flex-start;
    -webkit-overflow-scrolling: touch;
  }
  .column {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    min-width: 290px; max-width: 290px;
    flex-shrink: 0;
    display: flex; flex-direction: column;
    max-height: calc(100vh - 90px);
  }
  .column-header {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .column-title { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 0.95rem; }
  .column-count {
    background: var(--surface2); color: var(--text2);
    font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 999px;
  }
  .column-menu-btn { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 1.1rem; padding: 2px 6px; }
  .column-menu-btn:hover { color: var(--text); }
  .column-body { padding: 10px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 8px; min-height: 60px; }
  .column-footer { padding: 10px 14px 14px; }
  .add-task-btn {
    width: 100%; padding: 9px; background: none; border: 1px dashed var(--border);
    border-radius: 10px; color: var(--text2); cursor: pointer;
    font-family: 'Cairo', sans-serif; font-size: 0.82rem; font-weight: 700; transition: all 0.2s;
  }
  .add-task-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Add column card */
  .add-column {
    min-width: 200px; max-width: 200px; flex-shrink: 0;
    border: 1px dashed var(--border); border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    color: var(--text2); cursor: pointer; min-height: 80px;
    font-weight: 700; font-size: 0.85rem; transition: all 0.2s;
  }
  .add-column:hover { border-color: var(--accent); color: var(--accent); }

  /* Task item */
  .task {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 11px 12px;
    display: flex; align-items: flex-start; gap: 10px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .task.done { opacity: 0.5; }
  .task.done .task-text { text-decoration: line-through; }
  .checkbox {
    width: 20px; height: 20px; border-radius: 6px;
    border: 2px solid var(--border); cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; transition: all 0.2s; margin-top: 1px;
  }
  .checkbox.checked { background: var(--green); border-color: var(--green); color: #0f1117; }
  .task-info { flex: 1; min-width: 0; }
  .task-text { font-size: 0.86rem; font-weight: 600; word-break: break-word; line-height: 1.4; }
  .task-meta { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .badge { font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
  .badge.priority-high { background: rgba(245,108,108,0.15); color: var(--red); }
  .badge.priority-medium { background: rgba(245,166,35,0.15); color: var(--orange); }
  .badge.priority-low { background: rgba(108,142,245,0.15); color: var(--accent); }
  .badge.due { background: var(--surface); color: var(--text2); border: 1px solid var(--border); }
  .badge.due.overdue { color: var(--red); border-color: var(--red); }
  .task-delete {
    background: none; border: none; cursor: pointer; color: var(--text2);
    font-size: 0.95rem; padding: 2px; flex-shrink: 0;
  }
  .task-delete:hover { color: var(--red); }
  .empty-col { text-align: center; padding: 20px 10px; color: #374151; font-size: 0.8rem; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; backdrop-filter: blur(4px); animation: fadeIn 0.2s ease;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 26px; width: 100%; max-width: 420px;
    margin: 16px; animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal h3 { font-size: 1.05rem; font-weight: 900; margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.78rem; color: var(--text2); font-weight: 600; margin-bottom: 6px; }
  .form-group input, .form-group select {
    width: 100%; padding: 11px 14px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px; color: var(--text);
    font-family: 'Cairo', sans-serif; font-size: 0.9rem; direction: rtl;
  }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
  .priority-row { display: flex; gap: 8px; }
  .priority-btn {
    flex: 1; padding: 9px; border-radius: 10px; border: 1px solid var(--border);
    background: none; color: var(--text2); cursor: pointer;
    font-family: 'Cairo', sans-serif; font-size: 0.78rem; font-weight: 700; transition: all 0.2s;
  }
  .priority-btn.active.high { background: rgba(245,108,108,0.15); border-color: var(--red); color: var(--red); }
  .priority-btn.active.medium { background: rgba(245,166,35,0.15); border-color: var(--orange); color: var(--orange); }
  .priority-btn.active.low { background: rgba(108,142,245,0.15); border-color: var(--accent); color: var(--accent); }
  .priority-btn.active.none { background: var(--surface2); border-color: var(--text2); color: var(--text); }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn-primary {
    flex: 1; padding: 12px; background: var(--accent); border: none; border-radius: 10px;
    color: #fff; font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 0.92rem; cursor: pointer;
  }
  .btn-primary:hover { background: #5a7df0; }
  .btn-secondary {
    padding: 12px 18px; background: none; border: 1px solid var(--border);
    border-radius: 10px; color: var(--text2); font-family: 'Cairo', sans-serif;
    font-weight: 700; font-size: 0.92rem; cursor: pointer;
  }
  .btn-secondary:hover { border-color: var(--text2); color: var(--text); }
  .btn-danger-text { text-align: center; margin-top: 14px; color: var(--red); font-size: 0.8rem; cursor: pointer; font-weight: 700; }

  /* Emoji picker */
  .emoji-grid { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .emoji-btn {
    width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface2); cursor: pointer; font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .emoji-btn:hover, .emoji-btn.selected { border-color: var(--accent); background: rgba(108,142,245,0.15); }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 700px) {
    .column { min-width: 78vw; max-width: 78vw; }
    .add-column { min-width: 60vw; max-width: 60vw; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📋 قوائمي<span></span></h1>
  <div class="header-actions">
    <button class="icon-btn" onclick="exportData()">📤 تصدير</button>
    <button class="icon-btn" onclick="document.getElementById('importFile').click()">📥 استيراد</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>

<div class="board" id="board"></div>

<!-- Add/Edit Task Modal -->
<div class="modal-overlay" id="taskModal" style="display:none" onclick="closeOnOverlay(event,'taskModal')">
  <div class="modal">
    <h3 id="taskModalTitle">إضافة مهمة</h3>
    <div class="form-group">
      <label>النص</label>
      <input type="text" id="taskText" placeholder="مثال: شراء حليب">
    </div>
    <div class="form-group">
      <label>الأولوية</label>
      <div class="priority-row">
        <button class="priority-btn active none" data-p="none" onclick="setPriority('none')">بدون</button>
        <button class="priority-btn low" data-p="low" onclick="setPriority('low')">🔵 منخفضة</button>
        <button class="priority-btn medium" data-p="medium" onclick="setPriority('medium')">🟠 متوسطة</button>
        <button class="priority-btn high" data-p="high" onclick="setPriority('high')">🔴 عالية</button>
      </div>
    </div>
    <div class="form-group">
      <label>تاريخ الاستحقاق (اختياري)</label>
      <input type="date" id="taskDue">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('taskModal')">إلغاء</button>
      <button class="btn-primary" onclick="saveTask()">حفظ</button>
    </div>
  </div>
</div>

<!-- Add/Edit Column Modal -->
<div class="modal-overlay" id="columnModal" style="display:none" onclick="closeOnOverlay(event,'columnModal')">
  <div class="modal">
    <h3 id="columnModalTitle">قائمة جديدة</h3>
    <div class="form-group">
      <label>اسم القائمة</label>
      <input type="text" id="columnName" placeholder="مثال: مهام العمل">
    </div>
    <div class="form-group">
      <label>أيقونة</label>
      <div class="emoji-grid" id="columnEmojiPicker">
        <button type="button" class="emoji-btn" onclick="pickColumnEmoji('🛒')">🛒</button>
        <button type="button" class="emoji-btn" onclick="pickColumnEmoji('💼')">💼</button>
        <button type="button" class="emoji-btn" onclick="pickColumnEmoji('🏠')">🏠</button>
        <button type="button" class="emoji-btn" onclick="pickColumnEmoji('📚')">📚</button>
        <button type="button" class="emoji-btn" onclick="pickColumnEmoji('🎯')">🎯</button>
        <button type="button" class="emoji-btn" onclick="pickColumnEmoji('💪')">💪</button>
        <button type="button" class="emoji-btn" onclick="pickColumnEmoji('🧾')">🧾</button>
        <button type="button" class="emoji-btn" onclick="pickColumnEmoji('✈️')">✈️</button>
        <button type="button" class="emoji-btn" onclick="pickColumnEmoji('💡')">💡</button>
        <button type="button" class="emoji-btn" onclick="pickColumnEmoji('📝')">📝</button>
        <button type="button" class="emoji-btn" onclick="pickColumnEmoji('❤️')">❤️</button>
        <button type="button" class="emoji-btn" onclick="pickColumnEmoji('⭐')">⭐</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('columnModal')">إلغاء</button>
      <button class="btn-primary" onclick="saveColumn()">حفظ</button>
    </div>
    <div class="btn-danger-text" id="deleteColumnBtn" style="display:none" onclick="deleteColumn()">🗑 حذف هذه القائمة</div>
  </div>
</div>

<script>
let columns = [];
let currentColumnId = null; // for adding task
let editingTaskId = null;
let editingColumnId = null;
let currentPriority = 'none';
let selectedColumnEmoji = '📝';

const DEFAULT_COLUMNS = [
  { id: 'c1', name: 'تسوق', emoji: '🛒', tasks: [] },
  { id: 'c2', name: 'مهام العمل', emoji: '💼', tasks: [] },
  { id: 'c3', name: 'مهام المنزل', emoji: '🏠', tasks: [] },
];

function load() {
  const saved = localStorage.getItem('taskColumns');
  columns = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_COLUMNS));
  ensureCompletedColumn();
}
function save() {
  localStorage.setItem('taskColumns', JSON.stringify(columns));
}

function fmtDateLocal(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function formatDue(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('ar-JO', { day: 'numeric', month: 'short' });
}
function isOverdue(iso) {
  const today = fmtDateLocal(new Date());
  return iso < today;
}

function formatCreated(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('ar-JO', { day: 'numeric', month: 'short' });
}
function ensureCompletedColumn() {
  if (!columns.find(c => c.id === 'completed')) {
    columns.push({ id: 'completed', name: 'المهام المكتملة', emoji: '✅', tasks: [], archive: true });
  }
}

const PRIORITY_LABELS = { high: '🔴 عالية', medium: '🟠 متوسطة', low: '🔵 منخفضة' };

function render() {
  const board = document.getElementById('board');
  let html = '';
  const ordered = [...columns.filter(c => !c.archive), ...columns.filter(c => c.archive)];
  ordered.forEach(col => {
    const remaining = col.archive ? col.tasks.length : col.tasks.filter(t => !t.done).length;
    html += `
    <div class="column">
      <div class="column-header">
        <div class="column-title"><span>${col.emoji}</span><span>${col.name}</span></div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="column-count">${remaining}</span>
          ${col.archive ? '' : `<button class="column-menu-btn" onclick="openColumnModal('${col.id}')">⋮</button>`}
        </div>
      </div>
      <div class="column-body">`;

    if (!col.tasks.length) {
      html += `<div class="empty-col">${col.archive ? 'لم تكتمل أي مهمة بعد' : 'لا توجد مهام<br>اضغطي "+ إضافة" بالأسفل'}</div>`;
    } else {
      let sorted;
      if (col.archive) {
        sorted = [...col.tasks].sort((a, b) => (b.completedAt || '').localeCompare(a.completedAt || ''));
      } else {
        const pOrder = { high: 0, medium: 1, low: 2, none: 3, undefined: 3 };
        sorted = [...col.tasks].sort((a, b) => {
          if (a.done !== b.done) return a.done ? 1 : -1;
          return (pOrder[a.priority] ?? 3) - (pOrder[b.priority] ?? 3);
        });
      }
      sorted.forEach(t => {
        const badges = [];
        if (t.priority && t.priority !== 'none') badges.push(`<span class="badge priority-${t.priority}">${PRIORITY_LABELS[t.priority]}</span>`);
        if (t.due) badges.push(`<span class="badge due ${!t.done && isOverdue(t.due) ? 'overdue' : ''}">📅 ${formatDue(t.due)}</span>`);
        if (col.archive) {
          badges.push(`<span class="badge due">${t.sourceEmoji || ''} ${t.sourceName || ''}</span>`);
          if (t.completedAt) badges.push(`<span class="badge due">✓ ${formatCreated(t.completedAt)}</span>`);
        } else if (t.createdAt) {
          badges.push(`<span class="badge due">🗓️ ${formatCreated(t.createdAt)}</span>`);
        }
        html += `
        <div class="task ${t.done ? 'done' : ''}">
          <div class="checkbox ${t.done ? 'checked' : ''}" onclick="toggleTask('${col.id}','${t.id}')">${t.done ? '✓' : ''}</div>
          <div class="task-info" ${col.archive ? '' : `onclick="openTaskModal('${col.id}','${t.id}')"`}>
            <div class="task-text">${t.text}</div>
            ${badges.length ? `<div class="task-meta">${badges.join('')}</div>` : ''}
          </div>
          <button class="task-delete" onclick="deleteTask('${col.id}','${t.id}')">🗑</button>
        </div>`;
      });
    }

    html += `
      </div>
      <div class="column-footer">
        ${col.archive ?
          (col.tasks.length ? `<button class="add-task-btn" style="color:var(--red);border-color:var(--red)" onclick="clearArchive()">🗑 حذف كل المكتمل نهائياً</button>` : '')
          :
          `<button class="add-task-btn" onclick="openTaskModal('${col.id}')">＋ إضافة مهمة</button>`
        }
      </div>
    </div>`;
  });

  html += `<div class="add-column" onclick="openColumnModal()">＋ قائمة جديدة</div>`;
  board.innerHTML = html;
}

function toggleTask(colId, taskId) {
  const col = columns.find(c => c.id === colId);
  const task = col.tasks.find(t => t.id === taskId);
  const archive = columns.find(c => c.id === 'completed');

  if (col.archive) {
    // Move back to source column
    task.done = false;
    delete task.completedAt;
    const sourceCol = columns.find(c => c.id === task.sourceColId) || columns[0];
    delete task.sourceColId; delete task.sourceName; delete task.sourceEmoji;
    col.tasks = col.tasks.filter(t => t.id !== taskId);
    sourceCol.tasks.push(task);
  } else {
    // Move to archive
    task.done = true;
    task.completedAt = new Date().toISOString();
    task.sourceColId = col.id;
    task.sourceName = col.name;
    task.sourceEmoji = col.emoji;
    col.tasks = col.tasks.filter(t => t.id !== taskId);
    archive.tasks.push(task);
  }
  save();
  render();
}
function deleteTask(colId, taskId) {
  const col = columns.find(c => c.id === colId);
  col.tasks = col.tasks.filter(t => t.id !== taskId);
  save();
  render();
}
function clearArchive() {
  if (!confirm('حذف كل المهام المكتملة نهائياً؟ لا يمكن التراجع.')) return;
  const archive = columns.find(c => c.id === 'completed');
  archive.tasks = [];
  save();
  render();
}

// Task modal
function openTaskModal(colId, taskId) {
  currentColumnId = colId;
  editingTaskId = taskId || null;
  document.getElementById('taskModalTitle').textContent = taskId ? 'تعديل المهمة' : 'إضافة مهمة';
  if (taskId) {
    const col = columns.find(c => c.id === colId);
    const task = col.tasks.find(t => t.id === taskId);
    document.getElementById('taskText').value = task.text;
    document.getElementById('taskDue').value = task.due || '';
    setPriority(task.priority || 'none');
  } else {
    document.getElementById('taskText').value = '';
    document.getElementById('taskDue').value = '';
    setPriority('none');
  }
  document.getElementById('taskModal').style.display = 'flex';
  setTimeout(() => document.getElementById('taskText').focus(), 100);
}
function setPriority(p) {
  currentPriority = p;
  document.querySelectorAll('.priority-btn').forEach(b => b.classList.toggle('active', b.dataset.p === p));
}
function saveTask() {
  const text = document.getElementById('taskText').value.trim();
  const due = document.getElementById('taskDue').value;
  if (!text) { alert('يرجى كتابة نص المهمة'); return; }

  const col = columns.find(c => c.id === currentColumnId);
  if (editingTaskId) {
    const task = col.tasks.find(t => t.id === editingTaskId);
    task.text = text;
    task.priority = currentPriority;
    task.due = due || null;
  } else {
    col.tasks.push({ id: Date.now().toString(), text, priority: currentPriority, due: due || null, done: false, createdAt: new Date().toISOString() });
  }
  save();
  closeModal('taskModal');
  render();
}

// Column modal
function openColumnModal(colId) {
  editingColumnId = colId || null;
  document.getElementById('columnModalTitle').textContent = colId ? 'تعديل القائمة' : 'قائمة جديدة';
  document.getElementById('deleteColumnBtn').style.display = colId ? 'block' : 'none';
  if (colId) {
    const col = columns.find(c => c.id === colId);
    document.getElementById('columnName').value = col.name;
    pickColumnEmoji(col.emoji);
  } else {
    document.getElementById('columnName').value = '';
    pickColumnEmoji('📝');
  }
  document.getElementById('columnModal').style.display = 'flex';
  setTimeout(() => document.getElementById('columnName').focus(), 100);
}
function pickColumnEmoji(emoji) {
  selectedColumnEmoji = emoji;
  document.querySelectorAll('#columnEmojiPicker .emoji-btn').forEach(b => b.classList.toggle('selected', b.textContent.trim() === emoji));
}
function saveColumn() {
  const name = document.getElementById('columnName').value.trim();
  if (!name) { alert('يرجى كتابة اسم القائمة'); return; }

  if (editingColumnId) {
    const col = columns.find(c => c.id === editingColumnId);
    col.name = name;
    col.emoji = selectedColumnEmoji;
  } else {
    columns.push({ id: 'c' + Date.now(), name, emoji: selectedColumnEmoji, tasks: [] });
  }
  save();
  closeModal('columnModal');
  render();
}
function deleteColumn() {
  if (!confirm('حذف هذه القائمة وكل مهامها؟')) return;
  columns = columns.filter(c => c.id !== editingColumnId);
  save();
  closeModal('columnModal');
  render();
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function closeOnOverlay(e, id) { if (e.target.classList.contains('modal-overlay')) closeModal(id); }

// Export / Import
function exportData() {
  const blob = new Blob([JSON.stringify({ columns, exportedAt: new Date().toISOString() }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `قوائمي_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
}
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const incoming = JSON.parse(e.target.result);
      const existingColIds = new Set(columns.map(c => c.id));
      let addedCols = 0, addedTasks = 0;
      (incoming.columns || []).forEach(ic => {
        let col = columns.find(c => c.id === ic.id);
        if (!col) {
          // avoid id collision if name differs
          col = columns.find(c => c.name === ic.name);
        }
        if (!col) {
          columns.push({ id: ic.id, name: ic.name, emoji: ic.emoji, tasks: [] });
          col = columns[columns.length - 1];
          addedCols++;
        }
        const existingTaskIds = new Set(col.tasks.map(t => t.id));
        (ic.tasks || []).forEach(t => {
          if (!existingTaskIds.has(t.id)) { col.tasks.push(t); addedTasks++; }
        });
      });
      ensureCompletedColumn();
      save();
      alert(`تم الاستيراد ✅\nقوائم جديدة: ${addedCols}\nمهام جديدة: ${addedTasks}`);
      render();
    } catch (err) {
      alert('ملف غير صالح');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal('taskModal'); closeModal('columnModal'); }
});

load();
render();
</script>
